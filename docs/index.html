<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Carnivore Spotter — Report a Sighting</title>

  <!-- The destination form -->
  <link rel="canonical" href="https://carnivorespotter.org/urban-carnivore-spotter/reports/create" />

  <!-- PWA / Add-to-Home-Screen: our OWN manifest with a correct start_url -->
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#2f3b2f" />

  <!-- iOS standalone web-app hints -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Report Wildlife" />
  <link rel="apple-touch-icon" href="icon-192.png" />

  <!-- ====== SCAN COUNTER ======================================================
       Counts every scan/visit. Dashboard: https://delsauce.goatcounter.com/
       GoatCounter is cookieless and collects no personal data.
  -->
  <script data-goatcounter="https://delsauce.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
  <!-- ======================================================================== -->

  <style>
    html,body{height:100%;margin:0}
    body{
      display:flex;align-items:center;justify-content:center;
      font:16px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
      background:#2f3b2f;color:#f4f1e9;text-align:center;padding:24px
    }
    main{max-width:22rem}
    h1{font-size:1.5rem;margin:0 0 .25rem}
    p.sub{color:#cdd3c5;margin:0 0 1.5rem}
    a.btn{
      display:inline-block;padding:.85rem 1.4rem;
      background:#cda349;color:#2f3b2f;text-decoration:none;border-radius:.6rem;
      font-weight:700;font-size:1.1rem
    }
    .hint{font-size:.85rem;color:#9aa492;margin-top:1.75rem}
  </style>
</head>
<body>
  <main>
    <h1>🐾 Carnivore Spotter</h1>
    <p class="sub">Spotted a coyote, bobcat, bear or other carnivore? Log it for the Woodland Park Zoo / Seattle U research project.</p>
    <a class="btn" href="https://carnivorespotter.org/urban-carnivore-spotter/reports/create">Report a sighting →</a>
    <p class="hint">
      Tip: tap <strong>Share&nbsp;⤴ → “Add to Home Screen”</strong> to save this for next time.
    </p>
  </main>
</body>
</html>
