<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Carnivore Spotter — Report a Sighting</title>

  <!-- The destination form -->
  <link rel="canonical" href="https://carnivorespotter.org/urban-carnivore-spotter/reports/create" />

  <!-- PWA / Add-to-Home-Screen: our OWN manifest with a correct start_url -->
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#2f3b2f" />

  <!-- iOS standalone web-app hints -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Report Wildlife" />
  <link rel="apple-touch-icon" href="icon-192.png" />

  <!-- ====== SCAN COUNTER ======================================================
       Counts every scan/visit, and records the ?src=... channel separately.
       1) Make a free GoatCounter account: https://www.goatcounter.com/
       2) Replace YOURCODE below with your site code.
       GoatCounter is cookieless and collects no personal data.
       (Prefer no code? Use per-channel short links instead — see project notes.)
  -->
  <script data-goatcounter="https://YOURCODE.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
  <!-- ======================================================================== -->

  <!-- For a QR scan / browser: pause briefly so the scan is COUNTED, then redirect.
       (An instant redirect would navigate away before the counter fires.) -->
  <noscript><meta http-equiv="refresh" content="1; url=https://carnivorespotter.org/urban-carnivore-spotter/reports/create" /></noscript>
  <script>
    setTimeout(function () {
      location.replace("https://carnivorespotter.org/urban-carnivore-spotter/reports/create");
    }, 900); // ~0.9s is enough for the beacon to send; still feels instant
  </script>

  <style>
    html,body{height:100%;margin:0}
    body{
      display:flex;align-items:center;justify-content:center;
      font:16px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
      background:#2f3b2f;color:#f4f1e9;text-align:center;padding:24px
    }
    a{color:#cda349}
  </style>
</head>
<body>
  <main>
    <p>🐾 Opening the Carnivore Spotter report form…</p>
    <p>If it doesn't open automatically,
      <a href="https://carnivorespotter.org/urban-carnivore-spotter/reports/create">tap here to report a sighting</a>.
    </p>
  </main>
</body>
</html>
